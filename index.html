<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎴 Memoria SST Pro</title>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "safe-game-71018.firebaseapp.com",
  projectId: "safe-game-71018",
  storageBucket: "safe-game-71018.appspot.com",
  messagingSenderId: "433832606340",
  appId: "1:433832606340:web:4aedd33c547e17db15a0d1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.guardarPuntajeFirebase = async function(empresa, usuario, juego, puntaje){
  try{
    await addDoc(collection(db,"historial_puntajes"),{
      empresa,
      usuario,
      juego,
      puntaje,
      fecha: serverTimestamp()
    });
    console.log("🔥 Guardado en Firebase");
  }catch(e){
    console.error("❌ Error:", e);
  }
}
</script>

<style>
body{
  font-family: Arial;
  background:#f5f5f5;
  text-align:center;
  margin:0;
  padding:10px;
}

h1{ color:#2979ff; }

.grid{
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:10px;
  justify-content:center;
  margin-top:20px;
  max-width:500px;
  margin-left:auto;
  margin-right:auto;
}

.card{
  width:100%;
  aspect-ratio:1/1;
  perspective:1000px;
  cursor:pointer;
}

.inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 0.6s;
}

.card.flip .inner{
  transform:rotateY(180deg);
}

.front, .back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:6vw;
  backface-visibility:hidden;
}

.front{
  background:#2979ff;
  color:white;
}

.back{
  background:#fff;
  transform:rotateY(180deg);
}

#score{
  margin-top:20px;
  font-size:20px;
}

#questionBox{
  margin-top:20px;
  display:none;
}

button{
  margin:5px;
  padding:10px 15px;
  font-size:16px;
  border:none;
  border-radius:8px;
  background:#2979ff;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>🎴 Memoria SST</h1>
<p>Encuentra las parejas y responde preguntas para ganar puntos</p>

<div id="score">Puntos: 0</div>

<button onclick="restartGame()">🔄 Reiniciar</button>

<div class="grid" id="grid"></div>

<div id="questionBox">
  <h3 id="question"></h3>
  <div id="answers"></div>
</div>

<script>
let icons = ["🪖","🪖","🧯","🧯","⚡","⚡","🧤","🧤","👓","👓","🚧","🚧","🔥","🔥","🚑","🚑"];
let grid = document.getElementById("grid");
let first = null;
let second = null;
let lock = false;
let score = 0;
let matches = 0;
let answered = false;

const questions = [
 {q:"¿Qué EPP protege la cabeza?", o:["Casco","Guantes","Botas"], r:0},
 {q:"¿Para qué sirve un extintor?", o:["Apagar fuego","Cocinar","Iluminar"], r:0},
 {q:"¿Riesgo de cables sueltos?", o:["Eléctrico","Químico","Biológico"], r:0},
 {q:"¿Qué protege las manos?", o:["Guantes","Casco","Gafas"], r:0},
 {q:"¿Qué elemento protege contra caídas desde altura?", o:["Línea de vida","Casco","Guantes"], r:0},
 {q:"¿Qué tipo de riesgo es una sustancia tóxica?", o:["Químico","Físico","Mecánico"], r:0},
 {q:"¿Qué debe hacerse antes de usar una herramienta?", o:["Inspeccionarla","Golpearla","Prestarla"], r:0},
 {q:"¿Qué protege los ojos?", o:["Gafas","Botas","Chaleco"], r:0}
];

let questionsPool = [];

function resetQuestions(){
  questionsPool = [...questions];
  shuffle(questionsPool);
}

function getQuestion(){
  if(questionsPool.length === 0){
    resetQuestions();
  }
  return questionsPool.pop();
}

function shuffle(array){
  return array.sort(()=>Math.random()-0.5);
}

function shuffleQuestion(question){
  let options = [...question.o];
  let correctAnswer = options[question.r];

  options = options.sort(() => Math.random() - 0.5);
  let newIndex = options.indexOf(correctAnswer);

  return {
    q: question.q,
    o: options,
    r: newIndex
  };
}

function createBoard(){
  gtag('event', 'inicio_juego');
  grid.innerHTML="";
  shuffle(icons).forEach(icon=>{
    const card = document.createElement("div");
    card.classList.add("card");

    card.innerHTML=`
      <div class="inner">
        <div class="front">❓</div>
        <div class="back">${icon}</div>
      </div>
    `;

    card.onclick=()=>flip(card,icon);
    grid.appendChild(card);
  });
}

function flip(card,icon){
  if(lock || card === first?.card || card.classList.contains("flip")) return;

  card.classList.add("flip");
  gtag('event', 'flip_carta');

  if(!first){
    first={card,icon};
    return;
  }

  second={card,icon};
  lock=true;

  if(first.icon === second.icon){
    score += 5;
    matches++;
    updateScore();
    setTimeout(showQuestion,500);
    reset();
  }else{
    setTimeout(()=>{
      first.card.classList.remove("flip");
      second.card.classList.remove("flip");
      reset();
    },800);
  }
}

function reset(){
  first=null;
  second=null;
  lock=false;
}

function updateScore(){
  document.getElementById("score").innerText="Puntos: "+score;
}

function restartGame(){
  gtag('event', 'reinicio_juego');
  score = 0;
  matches = 0;
  updateScore();
  document.getElementById("questionBox").style.display="none";
  resetQuestions();
  createBoard();
}

function showQuestion(){
  lock = true;

  const q = shuffleQuestion(getQuestion());
  answered = false;

  const box = document.getElementById("questionBox");
  const text = document.getElementById("question");
  const answers = document.getElementById("answers");

  text.innerText = q.q;
  answers.innerHTML="";
  box.style.display="block";

  q.o.forEach((op,i)=>{
    const btn=document.createElement("button");
    btn.innerText=op;

    btn.onclick=()=>{
      if(answered) return;
      answered = true;

      gtag('event', 'respuesta');

      if(i === q.r){
        score += 10;
        gtag('event', 'respuesta_correcta');
        alert("✅ ¡Correcto! +10 puntos");
      } else {
        score -= 10;
        gtag('event', 'respuesta_incorrecta');
        alert("❌ Incorrecto -10 puntos");
      }

      updateScore();

      setTimeout(()=>{
        box.style.display="none";
        lock = false;
        checkEnd();
      },300);
    }

    answers.appendChild(btn);
  });
}

function checkEnd(){
  if(matches === icons.length/2){
    gtag('event', 'juego_completado', { value: score });

    const params = new URLSearchParams(window.location.search);
    const empresa = params.get('empresa') || 'anonimo';
    const usuario = params.get('user') || 'jugador';

    guardarPuntajeFirebase(empresa, usuario, 'MemoriaSST', score);

    setTimeout(()=>{
      alert("🏆 ¡Ganaste! Puntos: "+score);
    },80);
  }
}

resetQuestions();
createBoard();
</script>

</body>
</html>
